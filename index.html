<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltCheck — EV Battery Diagnostics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a; --white: #f8f6f1;
    --green: #1a7a4a; --green-light: #2db368;
    --accent: #c8f065; --gray: #8a8a82;
    --border: rgba(255,255,255,0.08); --card-bg: rgba(255,255,255,0.03);
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--black); color: var(--white); overflow-x: hidden; line-height: 1.6; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 3rem; background: rgba(10,10,10,0.88); backdrop-filter: blur(16px); border-bottom: 0.5px solid var(--border); gap: 1rem; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; letter-spacing: -0.02em; color: var(--white); text-decoration: none; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.85)} }
  .nav-links { display: flex; align-items: center; gap: 2.5rem; list-style: none; }
  .nav-links a { font-size: 0.875rem; font-weight: 400; letter-spacing: 0.02em; color: var(--gray); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--white); }
  .nav-right { display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
  .nav-cta { font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500; background: var(--accent); color: var(--black); padding: 0.55rem 1.4rem; border-radius: 100px; text-decoration: none; transition: opacity 0.2s, transform 0.2s; display: inline-block; white-space: nowrap; }
  .nav-cta:hover { opacity: 0.9; transform: translateY(-1px); }

  .lang-switch { display: flex; align-items: center; background: rgba(255,255,255,0.06); border: 0.5px solid var(--border); border-radius: 100px; padding: 3px; gap: 2px; }
  .lang-btn { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; color: var(--gray); background: none; border: none; cursor: pointer; padding: 4px 10px; border-radius: 100px; transition: all 0.2s; }
  .lang-btn.active { background: var(--accent); color: var(--black); }
  .lang-btn:not(.active):hover { color: var(--white); }

  .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 8rem 3rem 5rem; position: relative; overflow: hidden; }
  .hero-bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(ellipse 60% 50% at 80% 50%, rgba(26,122,74,0.18) 0%, transparent 70%), radial-gradient(ellipse 40% 60% at 10% 80%, rgba(200,240,101,0.06) 0%, transparent 60%); }
  .hero-grid { position: absolute; inset: 0; z-index: 0; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 60px 60px; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%); }
  .hero-tag { position: relative; z-index: 1; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; }
  .hero-tag::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--accent); }
  .hero h1 { position: relative; z-index: 1; font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2.6rem, 6.5vw, 5.5rem); line-height: 1.05; letter-spacing: -0.03em; max-width: 16ch; margin-bottom: 1.5rem; }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero-sub { position: relative; z-index: 1; font-size: 1.1rem; font-weight: 300; color: var(--gray); max-width: 46ch; line-height: 1.7; margin-bottom: 2.5rem; }
  .hero-actions { position: relative; z-index: 1; display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; }
  .btn-primary { font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; background: var(--accent); color: var(--black); padding: 0.9rem 2rem; border-radius: 100px; text-decoration: none; transition: opacity 0.2s, transform 0.2s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
  .btn-ghost { font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 400; color: var(--gray); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .btn-ghost:hover { color: var(--white); }
  .btn-ghost svg { transition: transform 0.2s; }
  .btn-ghost:hover svg { transform: translateX(3px); }
  .hero-badges { position: relative; z-index: 1; display: flex; align-items: center; gap: 1rem; margin-top: 3.5rem; padding-top: 2rem; border-top: 0.5px solid var(--border); width: 100%; max-width: 640px; flex-wrap: wrap; }
  .badge { font-size: 0.8rem; color: var(--gray); display: flex; align-items: center; gap: 6px; }
  .badge svg { color: var(--accent); flex-shrink: 0; }

  section { padding: 6rem 3rem; }
  .section-label { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
  .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: clamp(2rem, 4vw, 2.8rem); letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 1rem; }
  .section-sub { font-size: 1rem; font-weight: 300; color: var(--gray); max-width: 48ch; line-height: 1.7; }

  .steps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1px; margin-top: 4rem; border: 0.5px solid var(--border); border-radius: 16px; overflow: hidden; }
  .step { background: var(--card-bg); padding: 2.5rem 2rem; transition: background 0.3s; }
  .step:hover { background: rgba(255,255,255,0.055); }
  .step-num { font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 1.5rem; }
  .step-icon { width: 44px; height: 44px; background: rgba(200,240,101,0.08); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; }
  .step h3 { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 600; margin-bottom: 0.6rem; }
  .step p { font-size: 0.9rem; color: var(--gray); line-height: 1.65; }

  .checks { background: rgba(255,255,255,0.015); border-radius: 20px; border: 0.5px solid var(--border); overflow: hidden; margin-top: 4rem; }
  .checks-header { display: grid; grid-template-columns: 1fr 1fr; }
  .checks-col { padding: 2.5rem; border-bottom: 0.5px solid var(--border); }
  .checks-col + .checks-col { border-left: 0.5px solid var(--border); }
  .checks-items { display: grid; grid-template-columns: 1fr 1fr; }
  .check-item { padding: 1.4rem 2.5rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-start; gap: 12px; transition: background 0.2s; }
  .check-item:hover { background: rgba(255,255,255,0.025); }
  .check-item:nth-child(odd) { border-right: 0.5px solid var(--border); }
  .check-bullet { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 7px; }
  .check-item p { font-size: 0.875rem; color: var(--gray); line-height: 1.5; }
  .check-item strong { display: block; color: var(--white); font-weight: 500; font-size: 0.9rem; }

  .cara-section { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
  .cara-visual { background: rgba(26,122,74,0.08); border: 0.5px solid rgba(26,122,74,0.25); border-radius: 20px; padding: 3rem 2.5rem; text-align: center; position: relative; overflow: hidden; }
  .cara-visual::before { content: ''; position: absolute; top: -40px; left: 50%; transform: translateX(-50%); width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(26,122,74,0.3) 0%, transparent 70%); }
  .cara-logo-big { font-family: 'Syne', sans-serif; font-size: 3.5rem; font-weight: 800; color: var(--accent); letter-spacing: -0.04em; position: relative; z-index: 1; margin-bottom: 0.5rem; }
  .cara-logo-sub { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); position: relative; z-index: 1; }
  .cara-divider { width: 40px; height: 1px; background: rgba(200,240,101,0.3); margin: 1.5rem auto; position: relative; z-index: 1; }
  .cara-report-lines { position: relative; z-index: 1; }
  .cara-line { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.07); margin-bottom: 8px; }
  .cara-line.accent { background: rgba(200,240,101,0.2); width: 60%; }
  .cara-line.med { width: 85%; }
  .cara-line.short { width: 50%; }

  #contact { background: rgba(255,255,255,0.01); }
  .form-wrapper { max-width: 680px; margin: 4rem auto 0; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.04em; color: var(--gray); text-transform: uppercase; }
  input, select, textarea { font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--white); background: rgba(255,255,255,0.04); border: 0.5px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; outline: none; transition: border-color 0.2s, background 0.2s; width: 100%; -webkit-appearance: none; }
  input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.2); }
  input:focus, select:focus, textarea:focus { border-color: rgba(200,240,101,0.4); background: rgba(255,255,255,0.06); }
  select { cursor: pointer; }
  select option { background: #1a1a1a; color: var(--white); }
  textarea { resize: vertical; min-height: 120px; }
  .form-submit { margin-top: 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .submit-note { font-size: 0.8rem; color: var(--gray); }
  .btn-submit { font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; background: var(--accent); color: var(--black); border: none; cursor: pointer; padding: 0.9rem 2.2rem; border-radius: 100px; transition: opacity 0.2s, transform 0.2s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-submit:active { transform: scale(0.98); }
  .form-success { display: none; text-align: center; padding: 3rem 2rem; background: rgba(26,122,74,0.08); border: 0.5px solid rgba(26,122,74,0.25); border-radius: 16px; margin-top: 4rem; }
  .form-success.visible { display: block; }
  .success-icon { width: 56px; height: 56px; border-radius: 50%; background: rgba(200,240,101,0.12); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
  .form-success h3 { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
  .form-success p { font-size: 0.95rem; color: var(--gray); }

  footer { padding: 2.5rem 3rem; border-top: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .footer-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; color: var(--white); display: flex; align-items: center; gap: 6px; }

  .fade-up { opacity: 0; transform: translateY(28px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .fade-up.visible { opacity: 1; transform: translateY(0); }
  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.2s; }
  .delay-3 { transition-delay: 0.3s; }
  .delay-4 { transition-delay: 0.4s; }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.25rem; }
    .nav-links { display: none; }
    section { padding: 4rem 1.5rem; }
    .hero { padding: 7rem 1.5rem 4rem; }
    .cara-section { grid-template-columns: 1fr; }
    .checks-header { grid-template-columns: 1fr; }
    .checks-col + .checks-col { border-left: none; border-top: 0.5px solid var(--border); }
    .checks-items { grid-template-columns: 1fr; }
    .check-item:nth-child(odd) { border-right: none; }
    .form-grid { grid-template-columns: 1fr; }
    footer { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="logo"><span class="logo-dot"></span>VoltCheck</a>
  <ul class="nav-links">
    <li><a href="#how-it-works" data-t="nav_how"></a></li>
    <li><a href="#diagnostics" data-t="nav_diag"></a></li>
    <li><a href="#report" data-t="nav_report"></a></li>
    <li><a href="#contact" data-t="nav_contact"></a></li>
  </ul>
  <div class="nav-right">
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('hu')">HU</button>

    <a href="#contact" class="nav-cta" data-t="nav_cta"></a>

</nav>

<section class="hero">

  <div class="hero-grid"></div>
  <div class="hero-tag fade-up" data-t="hero_tag"></div>
  <h1 class="fade-up delay-1" data-t-html="hero_h1"></h1>
  <p class="hero-sub fade-up delay-2" data-t="hero_sub"></p>
  <div class="hero-actions fade-up delay-3">
    <a href="#contact" class="btn-primary">
      <span data-t="hero_cta_book"></span>
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
    <a href="#how-it-works" class="btn-ghost">
      <span data-t="hero_cta_how"></span>
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </div>
  <div class="hero-badges fade-up delay-4">
    <div class="badge"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg><span data-t="badge_cara"></span></div>
    <div class="badge"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span data-t="badge_mobile"></span></div>
    <div class="badge"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span data-t="badge_same_day"></span></div>
    <div class="badge"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg><span data-t="badge_all_ev"></span></div>
  </div>
</section>

<section id="how-it-works">
  <div class="section-label fade-up" data-t="how_label"></div>
  <h2 class="section-title fade-up delay-1" data-t="how_title"></h2>
  <p class="section-sub fade-up delay-2" data-t="how_sub"></p>
  <div class="steps-grid">
    <div class="step fade-up">
      <div class="step-num">01</div>
      <div class="step-icon"><svg width="22" height="22" fill="none" stroke="var(--accent)" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
      <h3 data-t="step1_title"></h3><p data-t="step1_desc"></p>
    </div>
    <div class="step fade-up delay-1">
      <div class="step-num">02</div>
      <div class="step-icon"><svg width="22" height="22" fill="none" stroke="var(--accent)" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
      <h3 data-t="step2_title"></h3><p data-t="step2_desc"></p>
    </div>
    <div class="step fade-up delay-2">
      <div class="step-num">03</div>
      <div class="step-icon"><svg width="22" height="22" fill="none" stroke="var(--accent)" stroke-width="1.8" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
      <h3 data-t="step3_title"></h3><p data-t="step3_desc"></p>
    </div>
    <div class="step fade-up delay-3">
      <div class="step-num">04</div>
      <div class="step-icon"><svg width="22" height="22" fill="none" stroke="var(--accent)" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div>
      <h3 data-t="step4_title"></h3><p data-t="step4_desc"></p>
    </div>
  </div>
</section>

<section id="diagnostics">
  <div class="section-label fade-up" data-t="diag_label"></div>
  <h2 class="section-title fade-up delay-1" data-t="diag_title"></h2>
  <p class="section-sub fade-up delay-2" data-t="diag_sub"></p>
  <div class="checks fade-up delay-2">
    <div class="checks-header">
      <div class="checks-col">
        <p style="font-size:0.8rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:0.5rem;" data-t="compat_label"></p>
        <p style="font-size:1.1rem;font-weight:400;" data-t="compat_text"></p>
      </div>
      <div class="checks-col">
        <p style="font-size:0.8rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.08em;font-weight:500;margin-bottom:0.5rem;" data-t="area_label"></p>
        <p style="font-size:1.1rem;font-weight:400;" data-t="area_text"></p>
      </div>
    </div>
    <div class="checks-items">
      <div class="check-item"><div class="check-bullet"></div><div><strong data-t="chk1_title"></strong><p data-t="chk1_desc"></p></div></div>
      <div class="check-item"><div class="check-bullet"></div><div><strong data-t="chk2_title"></strong><p data-t="chk2_desc"></p></div></div>
      <div class="check-item"><div class="check-bullet"></div><div><strong data-t="chk3_title"></strong><p data-t="chk3_desc"></p></div></div>
      <div class="check-item"><div class="check-bullet"></div><div><strong data-t="chk4_title"></strong><p data-t="chk4_desc"></p></div></div>
      <div class="check-item"><div class="check-bullet"></div><div><strong data-t="chk5_title"></strong><p data-t="chk5_desc"></p></div></div>
      <div class="check-item"><div class="check-bullet"></div><div><strong data-t="chk6_title"></strong><p data-t="chk6_desc"></p></div></div>

      <div class="check-item"><div class="check-bullet"></div><div><strong data-t="chk8_title"></strong><p data-t="chk8_desc"></p></div></div>
    </div>
  </div>
</section>

<section id="report">
  <div class="cara-section">
    <div class="fade-up">
      <div class="section-label" data-t="cara_label"></div>
      <h2 class="section-title" data-t="cara_title"></h2>
      <p style="font-size:1rem;color:var(--gray);line-height:1.75;margin-bottom:1.5rem;" data-t="cara_p1"></p>
      <p style="font-size:1rem;color:var(--gray);line-height:1.75;margin-bottom:2rem;" data-t="cara_p2"></p>
      <div style="display:flex;flex-direction:column;gap:0.75rem;">
        <div style="display:flex;align-items:center;gap:10px;font-size:0.9rem;color:var(--white);"><svg width="16" height="16" fill="none" stroke="var(--accent)" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg><span data-t="cara_li1"></span></div>

let lang = 'en';

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === l));
  render();
}

function render() {
  const t = T[lang];
  document.querySelectorAll('[data-t]').forEach(el => {
    const v = t[el.getAttribute('data-t')];
    if (v !== undefined) el.textContent = v;
  });
  document.querySelectorAll('[data-t-html]').forEach(el => {
    const v = t[el.getAttribute('data-t-html')];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('[data-ph]').forEach(el => {
    const v = t[el.getAttribute('data-ph')];
    if (v !== undefined) el.placeholder = v;
  });
  document.title = lang === 'hu' ? 'VoltCheck — EV Akkumulátor Diagnosztika' : 'VoltCheck — EV Battery Diagnostics';
}

async function submitForm() {
  const fname = document.getElementById('fname').value.trim();
  const lname = document.getElementById('lname').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const make = document.getElementById('make').value;
  const model = document.getElementById('model').value.trim();
  const vtype = document.getElementById('vtype').value;
  const location = document.getElementById('location').value.trim();
  const message = document.getElementById('message').value.trim();

  // Field validation
  if (!fname || !email || !make) {
    [document.getElementById('fname'), document.getElementById('email'), document.getElementById('make')].forEach(el => {
      if (el && !el.value.trim()) { 
        el.style.borderColor='rgba(220,70,70,0.5)'; 
        setTimeout(()=>el.style.borderColor='',2000); 
      }
    });
    return;
  }

  // Update button UI while loading
  const submitBtn = document.querySelector('.btn-submit');
  const originalBtnContent = submitBtn.innerHTML;
  submitBtn.innerHTML = 'Sending...';
  submitBtn.disabled = true;

  try {
    const response = await fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({
        access_key: 'd4d04374-c62e-41c4-b89d-d8458d5c5f90', // <-- Replace this with your Web3Forms access key
        name: `${fname} ${lname}`.trim(),
        email: email,
        phone: phone,
        vehicle_make: make,
        vehicle_model: model,
        vehicle_type: vtype,
        location: location,
        message: message,
        subject: `New Diagnostic Booking from ${fname} - ${make}` 
      })
    });

    const result = await response.json();

    if (response.status === 200) {
      document.getElementById('booking-form').style.display = 'none';
      const msg = document.getElementById('success-msg');
      msg.classList.add('visible');
      msg.scrollIntoView({behavior:'smooth',block:'center'});
    } else {
      console.log(result);
      alert('Something went wrong. Please try again.');
      submitBtn.innerHTML = originalBtnContent;
      submitBtn.disabled = false;
    }
  } catch (error) {
    console.error(error);
    alert('Network error. Please check your connection and try again.');
    submitBtn.innerHTML = originalBtnContent;
    submitBtn.disabled = false;
  }
}

const obs = new IntersectionObserver(entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }), {threshold:0.1});
document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));

render();
